name: PR Risk Feedback

on:
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  feedback:
    uses: splice/pr-risk-classifier/.github/workflows/feedback.yml@v1
    permissions:
      contents: read
      pull-requests: write
      id-token: write   # for SSM-sourced Linear API key (VEL-345 auto-filer)
    secrets: inherit
